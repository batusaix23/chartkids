<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Chart de Actividades ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #6DD5FA;
    --sun: #FFD93D;
    --grass: #6BCB77;
    --coral: #FF6B6B;
    --purple: #C77DFF;
    --mint: #4ECDC4;
    --orange: #FF9A3C;
    --pink: #FF85A1;
    --cream: #FFFBF0;
    --dark: #2D2D2D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Baloo 2', cursive;
    background: linear-gradient(160deg, #a8edea 0%, #fed6e3 100%);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .page {
    background: var(--cream);
    border-radius: 30px;
    max-width: 820px;
    width: 100%;
    padding: 30px 30px 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
    overflow: hidden;
  }

  .page::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, #FFD93D55, transparent 70%);
    border-radius: 50%;
  }
  .page::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -60px;
    width: 240px; height: 240px;
    background: radial-gradient(circle, #6DD5FA44, transparent 70%);
    border-radius: 50%;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .stars-row {
    font-size: 1.6rem;
    letter-spacing: 4px;
    margin-bottom: 6px;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.7; } to { opacity: 1; } }

  .title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    color: var(--coral);
    line-height: 1;
    text-shadow: 3px 3px 0 #FFD93D, 5px 5px 0 rgba(0,0,0,0.08);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 1.1rem;
    color: #888;
    font-weight: 600;
  }

  .name-banner {
    background: linear-gradient(135deg, var(--sky), var(--mint));
    border-radius: 20px;
    padding: 14px 24px;
    margin: 0 auto 16px;
    max-width: 480px;
    display: flex;
    align-items: center;
    gap: 14px;
    justify-content: center;
    box-shadow: 0 6px 20px rgba(109,213,250,0.35);
  }

  .name-label { font-size: 0.95rem; color: rgba(255,255,255,0.85); font-weight: 600; white-space: nowrap; }

  .name-input {
    background: rgba(255,255,255,0.35);
    border: 2px dashed rgba(255,255,255,0.7);
    border-radius: 12px;
    padding: 6px 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: white;
    text-align: center;
    width: 180px;
    outline: none;
    transition: background 0.2s;
  }
  .name-input::placeholder { color: rgba(255,255,255,0.6); }
  .name-input:focus { background: rgba(255,255,255,0.5); }

  /* Money goal banner */
  .prize-banner {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border-radius: 20px;
    padding: 16px 24px;
    margin: 0 auto 28px;
    max-width: 560px;
    display: flex;
    align-items: center;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    box-shadow: 0 6px 20px rgba(34,197,94,0.35);
    position: relative;
    z-index: 1;
  }

  .prize-label { font-size: 0.95rem; color: rgba(255,255,255,0.9); font-weight: 700; white-space: nowrap; }
  .prize-amount { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #FFD93D; text-shadow: 1px 1px 0 rgba(0,0,0,0.2); }
  .star-value { font-size: 0.85rem; color: rgba(255,255,255,0.85); font-weight: 600; }
  .star-value span { font-family: 'Fredoka One', cursive; font-size: 1rem; color: white; }

  /* Tasks */
  .tasks-section { position: relative; z-index: 1; }

  .tasks-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 26px;
  }

  .task-row {
    display: grid;
    grid-template-columns: 36px 1fr 80px repeat(7, 40px);
    align-items: center;
    gap: 5px;
  }

  .task-num {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: white;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .task-name {
    background: white;
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--dark);
    border: 2px solid #eee;
    display: flex;
    align-items: center;
    gap: 7px;
    min-height: 44px;
  }
  .task-icon { font-size: 1rem; flex-shrink: 0; }

  .task-pay {
    background: #f0fdf4;
    border: 2px solid #bbf7d0;
    border-radius: 10px;
    text-align: center;
    padding: 4px 6px;
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    color: #16a34a;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    line-height: 1.1;
  }
  .task-pay .pay-label { font-size: 0.6rem; color: #86efac; font-family: 'Baloo 2', cursive; font-weight: 600; }

  .days-header {
    display: grid;
    grid-template-columns: 36px 1fr 80px repeat(7, 40px);
    align-items: center;
    gap: 5px;
    margin-bottom: 8px;
  }

  .day-header {
    font-size: 0.65rem;
    font-weight: 800;
    color: #aaa;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .check-cell {
    width: 40px; height: 44px;
    border-radius: 10px;
    background: white;
    border: 2.5px solid #e8e8e8;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    transition: all 0.2s;
    user-select: none;
    flex-shrink: 0;
  }
  .check-cell:hover { transform: scale(1.1); border-color: #ccc; }
  .check-cell.done {
    background: linear-gradient(135deg, #6BCB77, #4ECDC4);
    border-color: #6BCB77;
    box-shadow: 0 3px 8px rgba(107,203,119,0.4);
    transform: scale(1.05);
  }
  .check-cell.done::after { content: '⭐'; }

  .c0 { background: #FF6B6B; }
  .c1 { background: #C77DFF; }
  .c2 { background: #4ECDC4; }
  .c3 { background: #FF9A3C; }
  .c4 { background: #6BCB77; }
  .c5 { background: #FF85A1; }
  .c6 { background: #6DD5FA; }
  .c7 { background: #f97316; }
  .c8 { background: #a855f7; }
  .c9 { background: #eab308; color: #2D2D2D !important; }

  /* Progress */
  .progress-section {
    background: white;
    border-radius: 20px;
    padding: 20px 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    position: relative;
    z-index: 1;
  }

  .progress-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: var(--dark);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .progress-money {
    font-size: 1.5rem;
    color: #16a34a;
  }

  .progress-bar-bg {
    background: #f0f0f0;
    border-radius: 50px;
    height: 26px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 50px;
    background: linear-gradient(90deg, #22c55e, #4ECDC4, #6DD5FA);
    transition: width 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    font-size: 0.8rem;
    font-weight: 800;
    color: white;
    min-width: 36px;
  }

  .progress-sub {
    text-align: center;
    font-size: 0.88rem;
    color: #aaa;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .motivation {
    text-align: center;
    font-size: 0.95rem;
    color: #888;
    font-weight: 600;
  }
  .motivation.winner {
    color: #16a34a;
    font-size: 1.1rem;
    animation: bounce 0.6s infinite alternate;
  }
  @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.05); } }

  .btn-print {
    display: block;
    margin: 24px auto 0;
    background: linear-gradient(135deg, var(--coral), var(--pink));
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,107,107,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    z-index: 1;
  }
  .btn-print:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,107,0.4); }

  .footer-emoji {
    text-align: center;
    font-size: 1.4rem;
    margin-top: 20px;
    letter-spacing: 6px;
    opacity: 0.6;
    position: relative;
    z-index: 1;
  }

  @media print {
    body { background: white; padding: 0; }
    .page { box-shadow: none; border-radius: 0; }
    .btn-print { display: none; }
    .check-cell { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  @media (max-width: 620px) {
    .task-row, .days-header { grid-template-columns: 30px 1fr 64px repeat(7, 34px); gap: 3px; }
    .check-cell { width: 34px; height: 40px; font-size: 1rem; border-radius: 8px; }
    .task-num { width: 30px; height: 30px; font-size: 0.85rem; }
    .title { font-size: 2rem; }
    .day-header { font-size: 0.55rem; }
    .task-pay { font-size: 0.75rem; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="stars-row">💵 🌈 ⭐ 🌈 💵</div>
    <div class="title">¡Mi Chart de Campeón!</div>
    <div class="subtitle">Completa tus tareas y gana tu dinero 💰</div>
  </div>

  <div class="name-banner">
    <span class="name-label">👦 Mi nombre es:</span>
    <input class="name-input" type="text" placeholder="Escribe aquí" maxlength="20" />
  </div>

  <div class="prize-banner">
    <span class="prize-label">🎯 Meta semanal:</span>
    <span class="prize-amount">$20.00</span>
    <span class="star-value">· Cada ⭐ vale <span id="starValue">$0.29</span></span>
  </div>

  <div class="tasks-section">
    <div class="days-header">
      <div></div>
      <div></div>
      <div class="day-header" style="text-align:center;font-size:0.6rem;color:#16a34a;">Por ⭐</div>
      <div class="day-header">Lun</div>
      <div class="day-header">Mar</div>
      <div class="day-header">Mié</div>
      <div class="day-header">Jue</div>
      <div class="day-header">Vie</div>
      <div class="day-header">Sáb</div>
      <div class="day-header">Dom</div>
    </div>
    <div class="tasks-grid" id="tasksGrid"></div>
  </div>

  <div class="progress-section">
    <div class="progress-title">
      <span>💰 Dinero ganado</span>
      <span class="progress-money" id="progressMoney">$0.00 / $20.00</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%">0%</div>
    </div>
    <div class="progress-sub" id="progressSub">0 de 70 ⭐ completadas</div>
    <div class="motivation" id="motivation">¡Tú puedes! Empieza ganando tus primeras estrellas 💪</div>
  </div>

  <button class="btn-print" onclick="window.print()">🖨️ Imprimir mi chart</button>
  <div class="footer-emoji">🌟 🦁 🚀 🌈 🎉</div>
</div>

<script>
  const GOAL = 20;
  const tasks = [
    { icon: '🛏️', name: 'Tender mi cama', cat: 'hogar' },
    { icon: '🧹', name: 'Recoger mis juguetes', cat: 'hogar' },
    { icon: '🍽️', name: 'Poner / quitar la mesa', cat: 'hogar' },
    { icon: '📚', name: 'Hacer mi tarea escolar', cat: 'escolar' },
    { icon: '📖', name: 'Leer 10 minutos', cat: 'escolar' },
    { icon: '🗑️', name: 'Sacar la basura', cat: 'hogar' },
    { icon: '🧽', name: 'Limpiar el baño', cat: 'hogar' },
    { icon: '😴', name: 'Dormir a mi hora', cat: 'habitos' },
    { icon: '🤝', name: 'Ser amable y compartir', cat: 'comportamiento' },
    { icon: '😊', name: 'No pelear con nadie', cat: 'comportamiento' },
  ];

  const days = 7;
  const total = tasks.length * days; // 70 stars
  const valuePerStar = GOAL / total;

  // Show star value
  document.getElementById('starValue').textContent = '$' + valuePerStar.toFixed(2);

  let checked = new Set();
  const colors = ['c0','c1','c2','c3','c4','c5','c6','c7','c8','c9'];
  const grid = document.getElementById('tasksGrid');

  tasks.forEach((task, ti) => {
    const row = document.createElement('div');
    row.className = 'task-row';

    // Number bubble
    const num = document.createElement('div');
    num.className = `task-num ${colors[ti]}`;
    num.textContent = ti + 1;
    row.appendChild(num);

    // Task name
    const name = document.createElement('div');
    name.className = 'task-name';
    name.innerHTML = `<span class="task-icon">${task.icon}</span>${task.name}`;
    row.appendChild(name);

    // Pay per star cell
    const pay = document.createElement('div');
    pay.className = 'task-pay';
    pay.innerHTML = `<span class="pay-label">por ⭐</span>$${valuePerStar.toFixed(2)}`;
    row.appendChild(pay);

    // Day checkboxes
    for (let d = 0; d < days; d++) {
      const cell = document.createElement('div');
      cell.className = 'check-cell';
      const key = `${ti}-${d}`;

      cell.addEventListener('click', () => {
        if (checked.has(key)) {
          checked.delete(key);
          cell.classList.remove('done');
        } else {
          checked.add(key);
          cell.classList.add('done');
          cell.animate([{transform:'scale(1)'},{transform:'scale(1.3)'},{transform:'scale(1.05)'}], {duration:300});
        }
        updateProgress();
      });

      row.appendChild(cell);
    }

    grid.appendChild(row);
  });

  function updateProgress() {
    const count = checked.size;
    const earned = count * valuePerStar;
    const pct = Math.round((earned / GOAL) * 100);

    document.getElementById('progressMoney').textContent =
      '$' + earned.toFixed(2) + ' / $' + GOAL.toFixed(2);
    document.getElementById('progressSub').textContent =
      count + ' de ' + total + ' ⭐ completadas';

    const bar = document.getElementById('progressBar');
    bar.style.width = Math.min(pct, 100) + '%';
    bar.textContent = pct + '%';

    const msg = document.getElementById('motivation');
    if (pct === 0) {
      msg.textContent = '¡Tú puedes! Empieza ganando tus primeras estrellas 💪';
      msg.className = 'motivation';
    } else if (pct < 25) {
      msg.textContent = '¡Muy bien! ¡Vas acumulando dinero! 🌱';
      msg.className = 'motivation';
    } else if (pct < 50) {
      msg.textContent = '¡Increíble! ¡Ya llevas casi la mitad! 🚀';
      msg.className = 'motivation';
    } else if (pct < 75) {
      msg.textContent = '¡Wooow! ¡Eres un campeón del dinero! 🦁';
      msg.className = 'motivation';
    } else if (pct < 100) {
      msg.textContent = '¡Casi llegas a los $20! ¡No te rindas! 🎁✨';
      msg.className = 'motivation';
    } else {
      msg.textContent = '🎉 ¡¡¡LOGRASTE TUS $20!!! ¡¡¡Felicidades!!! 🎉🏆🎉';
      msg.className = 'motivation winner';
    }
  }
</script>
</body>
</html>
