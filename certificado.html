<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificado de Logro — ChartKids</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; background: #0f0f1a; color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

.actions { display: flex; gap: 12px; margin-bottom: 28px; }
.action-btn { padding: 10px 22px; border-radius: 50px; font-weight: 800; font-size: .88rem; cursor: pointer; font-family: 'Nunito', sans-serif; border: none; }
.btn-print { background: linear-gradient(135deg, #22c55e, #06b6d4); color: white; }
.btn-back  { background: #1a1a2e; border: 1px solid #2e2e50; color: #94a3b8; text-decoration: none; display: flex; align-items: center; }

/* Certificate */
.cert-wrap { background: white; border-radius: 20px; padding: 0; max-width: 720px; width: 100%; overflow: hidden; box-shadow: 0 0 60px rgba(124,58,237,.4); }
.cert-top { background: linear-gradient(135deg, #7c3aed, #06b6d4); padding: 40px 48px 32px; text-align: center; }
.cert-logo { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: white; opacity: .9; margin-bottom: 20px; }
.cert-title { font-family: 'Fredoka One', cursive; font-size: 2.2rem; color: white; }
.cert-subtitle { font-size: 1rem; color: rgba(255,255,255,.8); margin-top: 6px; }

.cert-body { padding: 40px 48px; text-align: center; color: #1e1b4b; }
.cert-emoji { font-size: 4rem; margin-bottom: 16px; }
.cert-presented { font-size: .95rem; color: #6b7280; margin-bottom: 10px; }
.cert-name { font-family: 'Fredoka One', cursive; font-size: 2.6rem; color: #7c3aed; border-bottom: 3px solid #e5e7eb; padding-bottom: 12px; margin-bottom: 16px; display: inline-block; min-width: 300px; }
.cert-name-placeholder { color: #d1d5db; font-style: italic; font-size: 1.5rem; }
.cert-achievement { font-size: 1rem; color: #374151; margin-bottom: 32px; line-height: 1.6; max-width: 460px; margin-left: auto; margin-right: auto; }
.cert-category { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, rgba(124,58,237,.1), rgba(6,182,212,.08)); border: 2px solid rgba(124,58,237,.2); border-radius: 50px; padding: 10px 24px; font-weight: 800; font-size: 1rem; color: #7c3aed; margin-bottom: 32px; }

.cert-footer { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 24px; border-top: 1px solid #e5e7eb; }
.cert-date { font-size: .82rem; color: #9ca3af; }
.cert-seal { text-align: center; }
.cert-seal-emoji { font-size: 2.2rem; }
.cert-seal-text { font-size: .65rem; font-weight: 800; color: #7c3aed; text-transform: uppercase; letter-spacing: .08em; }
.cert-signature { text-align: right; }
.cert-sig-line { width: 120px; border-bottom: 2px solid #d1d5db; margin-bottom: 6px; margin-left: auto; }
.cert-sig-name { font-size: .8rem; color: #6b7280; font-weight: 700; }

/* Name editor */
.name-editor { display: flex; gap: 10px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; justify-content: center; }
.name-input { padding: 10px 18px; border-radius: 50px; border: 1px solid #2e2e50; background: #1a1a2e; color: #f1f5f9; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700; width: 260px; }
.name-input:focus { outline: none; border-color: #7c3aed; }
.apply-btn { padding: 10px 22px; background: #7c3aed; color: white; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; }

@media print {
  body { background: white; padding: 0; }
  .actions, .name-editor { display: none; }
  .cert-wrap { box-shadow: none; border-radius: 0; max-width: 100%; }
  @page { margin: 0; size: A4 landscape; }
}

@media (max-width: 600px) {
  .cert-top, .cert-body { padding: 28px 24px; }
  .cert-name { font-size: 2rem; min-width: 200px; }
  .cert-title { font-size: 1.6rem; }
}
</style>
</head>
<body>

<div class="name-editor">
  <input type="text" class="name-input" id="name-input" placeholder="Nombre del niño/a" maxlength="40">
  <button class="apply-btn" onclick="applyName()">Actualizar</button>
</div>

<div class="actions">
  <button class="action-btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
  <a href="recompensas.html" class="action-btn btn-back">← Volver</a>
</div>

<div class="cert-wrap">
  <div class="cert-top">
    <div class="cert-logo">ChartKids✨</div>
    <div class="cert-title">Certificado de Logro</div>
    <div class="cert-subtitle">Actividades Creativas</div>
  </div>
  <div class="cert-body">
    <div class="cert-emoji" id="cert-emoji">🏆</div>
    <div class="cert-presented">Este certificado se otorga a</div>
    <div class="cert-name" id="cert-name"><span class="cert-name-placeholder">Nombre del niño/a</span></div>
    <div class="cert-achievement" id="cert-achievement">por completar con éxito todas las actividades de la categoría y demostrar curiosidad, creatividad y esfuerzo.</div>
    <div class="cert-category" id="cert-category">🏆 Categoría</div>
    <div class="cert-footer">
      <div class="cert-date" id="cert-date"></div>
      <div class="cert-seal">
        <div class="cert-seal-emoji">⭐</div>
        <div class="cert-seal-text">ChartKids</div>
      </div>
      <div class="cert-signature">
        <div class="cert-sig-line"></div>
        <div class="cert-sig-name">Firma del tutor/a</div>
      </div>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const cat   = params.get('cat')   || '';
const emoji = params.get('emoji') || '🏆';
const name  = params.get('name')  || 'Categoría';

document.getElementById('cert-emoji').textContent = emoji;
document.getElementById('cert-category').textContent = emoji + ' ' + name;
document.getElementById('cert-achievement').textContent =
  `por completar con éxito todas las actividades de ${name} y demostrar curiosidad, creatividad y esfuerzo.`;

const today = new Date();
document.getElementById('cert-date').textContent =
  today.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

const saved = localStorage.getItem('cert_name_' + cat);
if (saved) setName(saved);

function applyName() {
  const val = document.getElementById('name-input').value.trim();
  if (val) { setName(val); localStorage.setItem('cert_name_' + cat, val); }
}

function setName(val) {
  document.getElementById('name-input').value = val;
  document.getElementById('cert-name').textContent = val;
}

document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') applyName(); });
</script>
</body>
</html>
